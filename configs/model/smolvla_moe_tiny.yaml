model:
  backbone:
    type: tiny
    hidden_dim: 128
    text_vocab_size: 32768
    max_text_len: 64
    image_size: 64
    patch_size: 16
    num_layers: 2
    num_heads: 4
    freeze: false
  action_decoder:
    hidden_dim: 128
    action_dim: 7
    state_dim: 8
    horizon: 8
    num_layers: 2
    num_heads: 4
    ffn_mult: 4
    dropout: 0.0
    moe:
      enabled: true
      num_routed_experts: 4
      top_k: 1
      shared_expert: true
      routing: chunk
      load_balance_weight: 0.01
      router_z_loss_weight: 0.0001
  flow:
    train_time_epsilon: 0.001
    inference_steps: 4
