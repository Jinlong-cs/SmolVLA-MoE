model:
  backbone:
    type: hf_smolvlm2
    model_name: HuggingFaceTB/SmolVLM2-500M-Video-Instruct
    hidden_dim: 960
    context_dim: 960
    max_text_len: 128
    image_size: 256
    freeze: false
    gradient_checkpointing: true
    trust_remote_code: true
    torch_dtype: bfloat16
  action_decoder:
    hidden_dim: 768
    action_dim: 7
    state_dim: 8
    horizon: 16
    num_layers: 8
    num_heads: 12
    ffn_mult: 4
    dropout: 0.0
    moe:
      enabled: true
      num_routed_experts: 4
      top_k: 1
      shared_expert: true
      routing: chunk
      load_balance_weight: 0.01
      router_z_loss_weight: 0.0001
  flow:
    train_time_epsilon: 0.001
    inference_steps: 4
