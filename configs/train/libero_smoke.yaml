defaults:
  - ../model/smolvla_moe_tiny.yaml

seed: 7
output_dir: outputs/smoke
device: auto

dataset:
  type: synthetic
  batch_size: 2
  num_batches: 4
  num_cameras: 2
  image_size: 64
  text_len: 16
  vocab_size: 32768
  state_dim: 8
  action_dim: 7
  horizon: 8

train:
  batch_size: 2
  max_steps: 4
  learning_rate: 0.0003
  weight_decay: 0.01
  grad_clip_norm: 1.0
  log_every: 1
  save_every: 0
  ddp_find_unused_parameters: true
  wandb:
    enabled: false
    workspace: null
    project: smolvla-moe-libero
    name: smoke
    group: smoke
    mode: disabled
    dir: null
    tags:
      - smoke
      - smolvla-moe
    log_code: false
    log_first_batch: false
    log_checkpoints: false
