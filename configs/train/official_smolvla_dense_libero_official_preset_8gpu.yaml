defaults:
  - ../model/official_smolvla_dense_libero.yaml
  - ../dataset/libero_official_smolvla.yaml

seed: 7
output_dir: outputs/libero/official_smolvla_dense_base_init_official_preset
device: cuda

train:
  batch_size: 16
  max_steps: 30000
  learning_rate: 0.0001
  betas:
    - 0.9
    - 0.95
  eps: 0.00000001
  weight_decay: 0.0000000001
  grad_clip_norm: 10.0
  scheduler:
    type: cosine_decay_with_warmup
    warmup_steps: 1000
    decay_steps: 30000
    decay_lr: 0.0000025
  log_every: 20
  save_every: 5000
  save_final_checkpoint: true
  ddp_find_unused_parameters: false
  amp_dtype: bfloat16
  wandb:
    enabled: true
    workspace: null
    project: smolvla-official-libero
    name: official_smolvla_dense_base_init_official_preset_libero
    group: official_smolvla_dense_base_init_official_preset_8gpu
    mode: online
    dir: null
    tags:
      - official-smolvla
      - dense-baseline
      - libero
      - flow-matching
      - base-init
      - official-optimizer-preset
    notes: "Dense official SmolVLA LIBERO reproduction: initialize LIBERO-shaped SmolVLA from lerobot/smolvla_base with non-strict matching weights, use LIBERO dataset stats, and train with the official SmolVLA optimizer/scheduler preset. This is not continued finetuning from HuggingFaceVLA/smolvla_libero."
    resume: allow
    id_file: wandb_id.txt
    log_code: false
    log_first_batch: false
    log_checkpoints: false
