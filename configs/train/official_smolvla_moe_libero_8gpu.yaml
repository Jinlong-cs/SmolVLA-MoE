defaults:
  - ../model/official_smolvla_moe_libero.yaml
  - ../dataset/libero_official_smolvla.yaml

seed: 7
output_dir: outputs/libero/official_smolvla_moe_residual_top2_official_sched
device: cuda

train:
  batch_size: 16
  max_steps: 30000
  learning_rate: 0.0001
  betas:
    - 0.9
    - 0.95
  eps: 1.0e-8
  weight_decay: 1.0e-10
  grad_clip_norm: 10.0
  scheduler:
    type: cosine_decay_with_warmup
    peak_lr: 0.0001
    decay_lr: 0.0000025
    warmup_steps: 1000
    decay_steps: 30000
  log_every: 20
  save_every: 5000
  save_final_checkpoint: true
  ddp_find_unused_parameters: true
  amp_dtype: bfloat16
  wandb:
    enabled: true
    workspace: null
    project: smolvla-moe-libero
    name: official_smolvla_moe_residual_top2_official_sched_libero
    group: official_smolvla_moe_residual_top2_official_sched_8gpu
    mode: online
    dir: null
    tags:
      - official-smolvla
      - smolvla-moe
      - libero
      - residual-moe-adapter
      - top2-routing
      - official-optimizer-scheduler
      - flow-matching
      - shuffled-data
      - zero-init-residual-output
    notes: "Official HuggingFaceVLA/smolvla_libero with residual top-2 MoE adapters in the action expert MLPs; optimizer and cosine warmup/decay scheduler match the official SmolVLA training preset while the dense official policy stays frozen."
    resume: allow
    id_file: wandb_id.txt
    log_code: false
    log_first_batch: false
    log_checkpoints: false
