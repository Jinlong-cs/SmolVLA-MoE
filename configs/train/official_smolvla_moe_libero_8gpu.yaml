defaults:
  - ../model/official_smolvla_moe_libero.yaml
  - ../dataset/libero_official_smolvla.yaml

seed: 7
output_dir: outputs/libero/official_smolvla_moe_residual_shuffle_zeroout
device: cuda

train:
  batch_size: 16
  max_steps: 100000
  learning_rate: 0.0001
  weight_decay: 0.01
  grad_clip_norm: 1.0
  log_every: 20
  save_every: 5000
  save_final_checkpoint: true
  ddp_find_unused_parameters: true
  amp_dtype: bfloat16
  wandb:
    enabled: true
    workspace: null
    project: smolvla-moe-libero
    name: official_smolvla_moe_residual_shuffle_zeroout_libero
    group: official_smolvla_moe_residual_shuffle_zeroout_8gpu
    mode: online
    dir: null
    tags:
      - official-smolvla
      - smolvla-moe
      - libero
      - residual-moe-adapter
      - flow-matching
      - shuffled-data
      - zero-init-residual-output
    notes: "Official HuggingFaceVLA/smolvla_libero with residual top-1 MoE adapters in the action expert MLPs; shuffled LIBERO data and zero-initialized residual expert output preserve the dense policy at init while allowing adapter gradients."
    resume: allow
    id_file: wandb_id.txt
    log_code: false
    log_first_batch: false
    log_checkpoints: false
