<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="760" viewBox="0 0 1500 760" role="img" aria-labelledby="title desc">
  <title id="title">Official SmolVLA dense architecture</title>
  <desc id="desc">A CVPR-style block diagram of the official dense SmolVLA architecture: multi-view images, language, state tokens, SmolVLM2 backbone, flow-matching action expert with interleaved cross-attention and self-attention, and continuous action chunk output.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f3a4a"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f5f9f"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9a5b16"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#203040" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.4; rx: 12; }
      .box { stroke-width: 1.8; rx: 10; filter: url(#shadow); }
      .input { fill: #eef6ff; stroke: #7aa7d9; }
      .vlm { fill: #eff7ef; stroke: #78a879; }
      .state { fill: #f1f5f9; stroke: #94a3b8; }
      .action { fill: #fff7e8; stroke: #d39b42; }
      .output { fill: #eefbf6; stroke: #58a983; }
      .small { font: 500 17px Arial, Helvetica, sans-serif; fill: #334155; }
      .label { font: 600 19px Arial, Helvetica, sans-serif; fill: #1f2937; }
      .title { font: 700 28px Arial, Helvetica, sans-serif; fill: #111827; }
      .caption { font: 500 15px Arial, Helvetica, sans-serif; fill: #64748b; }
      .tiny { font: 500 13px Arial, Helvetica, sans-serif; fill: #64748b; }
      .math { font: 600 16px Arial, Helvetica, sans-serif; fill: #374151; }
      .tag { font: 700 12px Arial, Helvetica, sans-serif; fill: #475569; }
      .arrow { stroke: #2f3a4a; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .arrowBlue { stroke: #2f5f9f; stroke-width: 2.2; fill: none; marker-end: url(#arrowBlue); }
      .arrowOrange { stroke: #9a5b16; stroke-width: 2.2; fill: none; marker-end: url(#arrowOrange); }
      .dash { stroke-dasharray: 7 6; }
      .thin { stroke-width: 1.5; }
    </style>
  </defs>

  <rect class="bg" width="1500" height="760"/>
  <text x="750" y="44" text-anchor="middle" class="title">Official SmolVLA: Dense VLM + Flow-Matching Action Expert</text>
  <text x="750" y="72" text-anchor="middle" class="caption">Redrawn schematic of the Hugging Face / LeRobot SmolVLA architecture for comparison with the residual-MoE branch below</text>

  <rect x="42" y="112" width="300" height="500" class="panel"/>
  <text x="192" y="144" text-anchor="middle" class="label">Observation Inputs</text>

  <rect x="80" y="184" width="224" height="78" class="box input"/>
  <text x="192" y="214" text-anchor="middle" class="label">Multi-view RGB</text>
  <text x="192" y="239" text-anchor="middle" class="small">front, wrist, ...</text>

  <rect x="80" y="316" width="224" height="78" class="box input"/>
  <text x="192" y="346" text-anchor="middle" class="label">Language</text>
  <text x="192" y="371" text-anchor="middle" class="small">task instruction</text>

  <rect x="80" y="448" width="224" height="78" class="box input"/>
  <text x="192" y="478" text-anchor="middle" class="label">State</text>
  <text x="192" y="503" text-anchor="middle" class="small">sensorimotor vector</text>

  <rect x="392" y="122" width="338" height="490" class="panel"/>
  <text x="561" y="154" text-anchor="middle" class="label">SmolVLM2 VLM Backbone</text>

  <rect x="432" y="194" width="258" height="82" class="box vlm"/>
  <text x="561" y="224" text-anchor="middle" class="label">SigLIP Vision Encoder</text>
  <text x="561" y="250" text-anchor="middle" class="small">reduced visual tokens</text>

  <rect x="432" y="326" width="258" height="82" class="box vlm"/>
  <text x="561" y="356" text-anchor="middle" class="label">SmolLM2 Decoder</text>
  <text x="561" y="382" text-anchor="middle" class="small">image + language tokens</text>

  <rect x="432" y="458" width="258" height="82" class="box state"/>
  <text x="561" y="488" text-anchor="middle" class="label">State Projection</text>
  <text x="561" y="514" text-anchor="middle" class="small">state becomes one token</text>

  <rect x="790" y="160" width="246" height="92" class="box vlm"/>
  <text x="913" y="194" text-anchor="middle" class="label">Context Features</text>
  <text x="913" y="222" text-anchor="middle" class="small">intermediate VLM layers</text>

  <rect x="780" y="328" width="352" height="236" class="box action"/>
  <text x="956" y="365" text-anchor="middle" class="label">Dense Action Expert</text>
  <text x="956" y="392" text-anchor="middle" class="small">flow-matching transformer</text>

  <rect x="818" y="432" width="126" height="58" class="box action"/>
  <text x="881" y="456" text-anchor="middle" class="small">Cross-Attn</text>
  <text x="881" y="478" text-anchor="middle" class="tiny">to VLM context</text>

  <rect x="970" y="432" width="126" height="58" class="box action"/>
  <text x="1033" y="456" text-anchor="middle" class="small">Self-Attn</text>
  <text x="1033" y="478" text-anchor="middle" class="tiny">action tokens</text>

  <rect x="884" y="512" width="144" height="40" class="box action"/>
  <text x="956" y="537" text-anchor="middle" class="small">Dense MLP</text>

  <rect x="1210" y="190" width="224" height="96" class="box action"/>
  <text x="1322" y="223" text-anchor="middle" class="label">Flow Objective</text>
  <text x="1322" y="251" text-anchor="middle" class="math">predict v_theta(x_t,t,c)</text>

  <rect x="1208" y="392" width="228" height="96" class="box output"/>
  <text x="1322" y="426" text-anchor="middle" class="label">Action Chunk</text>
  <text x="1322" y="454" text-anchor="middle" class="math">continuous H x A</text>
  <text x="1322" y="475" text-anchor="middle" class="tiny">e.g. H=50, A=7 on LIBERO</text>

  <rect x="72" y="650" width="1356" height="54" class="panel"/>
  <text x="750" y="674" text-anchor="middle" class="caption">Official dense SmolVLA has no MoE routing: the VLM conditions a dense flow-matching action expert that directly predicts future continuous actions.</text>
  <text x="750" y="695" text-anchor="middle" class="tiny">Efficiency comes from a small VLM, reduced visual tokens, intermediate-layer conditioning, action chunking, and interleaved CA/SA attention.</text>

  <path d="M 304 222 C 356 222, 372 224, 432 235" class="arrow"/>
  <path d="M 304 354 C 356 354, 376 358, 432 367" class="arrow"/>
  <path d="M 304 486 C 356 486, 376 494, 432 500" class="arrowBlue"/>

  <path d="M 561 276 L 561 326" class="arrowBlue"/>
  <path d="M 561 408 L 561 458" class="arrowBlue"/>
  <path d="M 690 367 C 730 344, 752 218, 790 206" class="arrowBlue"/>
  <path d="M 690 500 C 744 502, 764 425, 780 402" class="arrowBlue dash"/>
  <path d="M 1036 206 L 1210 238" class="arrowBlue"/>
  <path d="M 1036 206 C 1086 240, 1106 360, 1132 416" class="arrowBlue dash"/>
  <path d="M 956 392 L 956 432" class="arrowOrange"/>
  <path d="M 881 490 C 890 505, 918 512, 956 512" class="arrowOrange thin"/>
  <path d="M 1033 490 C 1026 505, 1000 512, 956 512" class="arrowOrange thin"/>
  <path d="M 956 552 C 1018 574, 1132 500, 1208 440" class="arrowOrange"/>
  <path d="M 1322 286 L 1322 392" class="arrowOrange"/>

  <text x="362" y="208" text-anchor="middle" class="tiny">images</text>
  <text x="360" y="342" text-anchor="middle" class="tiny">text</text>
  <text x="360" y="474" text-anchor="middle" class="tiny">state</text>
  <text x="750" y="188" text-anchor="middle" class="tiny">context c</text>
  <text x="1150" y="224" text-anchor="middle" class="tiny">conditioning</text>
  <text x="1138" y="545" text-anchor="middle" class="tiny">denoise / flow sample</text>
  <text x="956" y="418" text-anchor="middle" class="tag">interleaved blocks</text>
</svg>
